apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: summitodoro
  namespace: summitodoro
  labels:
    app.kubernetes.io/name: summitodoro
    app.kubernetes.io/component: web

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: summitodoro
                port:
                  number: 80
