apiVersion: apps/v1
kind: Deployment
metadata:
  name: summitodoro
  namespace: summitodoro
  labels:
    app.kubernetes.io/name: summitodoro
    app.kubernetes.io/component: web

spec:
  replicas: 2
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: summitodoro

  template:
    metadata:
      labels:
        app.kubernetes.io/name: summitodoro
        app.kubernetes.io/component: web

    spec:
      terminationGracePeriodSeconds: 30

      imagePullSecrets:
        - name: ghcr-secret

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: summitodoro
          image: ghcr.io/louienismal4/summitodoro:initial
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: production

            - name: PORT
              value: "3000"

            - name: HOSTNAME
              value: "0.0.0.0"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            privileged: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

            - name: next-cache
              mountPath: /app/.next/cache

      volumes:
        - name: tmp
          emptyDir: {}

        - name: next-cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: summitodoro
  namespace: summitodoro
  labels:
    app.kubernetes.io/name: summitodoro
    app.kubernetes.io/component: web

spec:
  type: LoadBalancer

  selector:
    app.kubernetes.io/name: summitodoro

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
