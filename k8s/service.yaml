apiVersion: v1
kind: Service
metadata:
  name: summitodoro
  namespace: summitodoro
  labels:
    app.kubernetes.io/name: summitodoro
    app.kubernetes.io/component: web
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: summitodoro
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
      nodePort: 30080
